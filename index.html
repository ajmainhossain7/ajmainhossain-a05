<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
     <!-- tailwind & daisyUi cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 w-[420px] rounded-lg shadow ">

        <div class="text-center mb-6">

            <img src="./assets/github-logo.png" class="w-16 mx-auto mb-3" />

            <h1 class="text-xl font-bold">
                GitHub Issues Tracker
            </h1>

            <p class="text-gray-500 text-sm">
                Sign in to manage your issues
            </p>

        </div>

        <form id="loginForm">

            <label class="text-sm">Username</label>

            <input id="username" placeholder="Enter Username"
                class="w-full border-1 border-solid border-gray-200 p-2 rounded-lg mb-1" />

            <p class="text-xs text-[#4a00ff] mb-2">Default: admin</p>

            <label class="text-sm">Password</label>

            <input id="password" type="password" placeholder="Enter Password"
                class="w-full border-1 border-solid border-gray-200 p-2 rounded-lg mb-1" />

            <p class="text-xs text-[#4a00ff] mb-2">Default: admin123</p>

            <button class="w-full bg-[#4a00ff] text-white p-2 rounded-lg">
                Sign In
            </button>

        </form>
        <div class="flex items-center my-2">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-4 text-sm text-gray-500">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <div class="text-center mt-6 text-sm">

            <p class="text-xs text-gray-500 mb-2">Demo Credentials</p>

            <div class="bg-gray-50 p-5">
                <p>Username: <b>admin</b></p>
                <p>Password: <b>admin123</b></p>
            </div>

        </div>

    </div>

    <script src="./js/script.js"></script>

</body>

</html>
